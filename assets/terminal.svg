<svg xmlns="http://www.w3.org/2000/svg" width="960" height="380" viewBox="0 0 960 380" role="img" aria-labelledby="title desc">
  <title id="title">Leo's developer terminal</title>
  <desc id="desc">A neon terminal introducing Leo and his web, desktop, and full-stack toolkit.</desc>
  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00d4ff"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ff3d9a"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#58a6ff" stroke-opacity="0.055"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .muted { fill: #8b949e; }
    .prompt { fill: #3fb950; font-weight: 700; }
    .command { fill: #79c0ff; }
    .output { fill: #e6edf3; }
    .accent { fill: #d2a8ff; }
    .cursor { animation: blink 1s steps(2, start) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>

  <rect x="2" y="2" width="956" height="376" rx="18" fill="#080c14" stroke="url(#border)" stroke-width="4"/>
  <rect x="7" y="7" width="946" height="366" rx="14" fill="url(#grid)"/>
  <path d="M20 6h920a14 14 0 0 1 14 14v48H6V20A14 14 0 0 1 20 6Z" fill="url(#bar)"/>
  <path d="M7 68h946" stroke="url(#border)" stroke-opacity=".65"/>

  <circle cx="31" cy="36" r="7" fill="#ff5f56" filter="url(#glow)"/>
  <circle cx="55" cy="36" r="7" fill="#ffbd2e" filter="url(#glow)"/>
  <circle cx="79" cy="36" r="7" fill="#27c93f" filter="url(#glow)"/>
  <text x="108" y="42" font-size="15" class="muted">~/portfolio</text>
  <text x="795" y="42" font-size="14" fill="#3fb950">● BUILDING</text>

  <text x="34" y="112" font-size="17" class="prompt">leo@dev</text>
  <text x="125" y="112" font-size="17" class="muted">~/portfolio %</text>
  <text x="268" y="112" font-size="17" class="command">./hello</text>
  <text x="34" y="149" font-size="25" class="output" filter="url(#glow)">Hi, I'm Leo.</text>
  <text x="34" y="178" font-size="17" class="accent">I build for the web, the desktop, and everything between.</text>

  <text x="34" y="225" font-size="17" class="prompt">leo@dev</text>
  <text x="125" y="225" font-size="17" class="muted">~/portfolio %</text>
  <text x="268" y="225" font-size="17" class="command">stack --short</text>
  <text x="34" y="257" font-size="17" class="output">TypeScript · React · Vue · Next.js · NestJS · Electron · Docker</text>

  <text x="34" y="304" font-size="17" class="prompt">leo@dev</text>
  <text x="125" y="304" font-size="17" class="muted">~/portfolio %</text>
  <text x="268" y="304" font-size="17" class="command">git status --short</text>
  <text x="34" y="336" font-size="17" fill="#f0883e">M</text>
  <text x="58" y="336" font-size="17" class="output">learning/go</text>
  <rect x="188" y="321" width="10" height="19" rx="1" fill="#3fb950" class="cursor" filter="url(#glow)"/>
</svg>
